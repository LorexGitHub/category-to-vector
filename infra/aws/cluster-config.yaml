apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: ml-ensemble-cluster
  region: eu-central-1

managedNodeGroups:
  - name: linux-nodes
    # Free Tier (t3.micro - 1GB RAM) will result in Insufficient Memory / OOMKilled errors
    # for refernce look at ../assets/aws_proof1.png
    # when loading PyTorch models. A t3.xlarge (16GB RAM) is required for production.
    instanceType: t3.xlarge
    desiredCapacity: 1
