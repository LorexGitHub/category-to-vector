name: CI - Build and Push Docker Images

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Docker Hub Secrets Exist
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "❌ ERROR: DOCKERHUB_USERNAME is missing or empty in GitHub Secrets!"
            exit 1
          else
            echo "✅ DOCKERHUB_USERNAME is present."
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "❌ ERROR: DOCKERHUB_TOKEN is missing or empty in GitHub Secrets!"
            exit 1
          else
            echo "✅ DOCKERHUB_TOKEN is present."
          fi

      # CHANGED: Using raw CLI to log in instead of the Action
      - name: Docker CLI Login
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Embedding Service
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/embedding-service:latest .

      - name: Push Embedding Service to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/embedding-service:latest
      
      - name: Build Ensemble API
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ensemble-api:latest -f Dockerfile.ensemble .

      - name: Push Ensemble API to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/ensemble-api:latest

